name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      # OIDC Trusted Publishing (npm >= 11.5.1 via Node 24).
      # Requires Trusted Publisher on npmjs.com for this package:
      #   user: iraldoad  repo: ai-ide-config  workflow: publish.yml
      - name: Publish
        run: npm publish --access public --provenance
